<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reuben AI - Central Command</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 4px; }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 font-sans h-screen flex overflow-hidden">

<!-- ================= SIDEBAR ================= -->
<aside class="w-80 bg-gray-900 border-r border-gray-800 flex flex-col justify-between">
  <div class="p-4 flex flex-col h-full overflow-hidden">

    <button onclick="createNewSession()"
      class="w-full py-2.5 px-4 bg-emerald-600 hover:bg-emerald-500 transition rounded-lg font-medium text-sm flex items-center justify-center gap-2 mb-4 shadow-lg shadow-emerald-900/20">
      <span>+</span> New Chat
    </button>

    <div class="flex-1 overflow-y-auto space-y-1 pr-1" id="sessionList">
      <p class="text-xs text-gray-500 p-2">Loading history matrix...</p>
    </div>

  </div>

  <div class="p-4 border-t border-gray-800 text-xs text-gray-500 font-mono">
    CORE V1.2 // REUBEN MURIMI
  </div>
</aside>

<!-- ================= MAIN ================= -->
<main class="flex-1 flex flex-col bg-gray-950">

  <header class="h-16 border-b border-gray-900 flex items-center px-8 justify-between bg-gray-950/50 backdrop-blur">
    <h2 class="font-mono text-sm tracking-widest text-emerald-400 font-bold" id="currentChatTitle">
      REUBEN AI // AUTONOMOUS CORE
    </h2>
  </header>

  <div class="flex-1 overflow-y-auto p-8 space-y-6" id="chatStream">
    <div class="max-w-3xl mx-auto text-center py-20 text-gray-500">
      <h1 class="text-3xl font-bold text-gray-300 mb-2 font-mono">
        System Initialization Complete.
      </h1>
      <p class="text-sm">Select a previous conversation or start a new one.</p>
    </div>
  </div>

  <footer class="p-6 bg-gradient-to-t from-gray-950 via-gray-950 to-transparent">

    <div class="max-w-3xl mx-auto">

      <form id="queryForm"
        onsubmit="handleQuery(event)"
        class="relative flex items-center bg-gray-900 border border-gray-800 focus-within:border-emerald-500 transition rounded-xl p-2">

        <input type="text"
          id="userInput"
          autocomplete="off"
          placeholder="Message Reuben AI..."
          class="w-full bg-transparent py-3 px-4 text-sm text-gray-100 focus:outline-none placeholder-gray-500">

        <button type="submit"
          class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm px-5 py-2.5 rounded-lg transition">
          Execute
        </button>

      </form>

    </div>
  </footer>

</main>

<script>
  // ================= FIXED SUPABASE INIT =================
  const SUPABASE_URL = "https://whvzdutfyydshamwfhvu.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const EDGE_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/reuben-ai`;

  let activeSessionId = null;

  // ================= LOAD SESSIONS =================
  window.onload = async () => {
    await loadSessions();
  };

  async function loadSessions() {
    const { data, error } = await client
      .from('chat_sessions')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) return console.error(error);

    const container = document.getElementById('sessionList');
    container.innerHTML = '';

    data.forEach(session => {
      const btn = document.createElement('button');

      btn.className =
        `w-full text-left px-3 py-2.5 rounded-md text-sm truncate font-mono transition
        ${session.id === activeSessionId
          ? 'bg-gray-800 text-emerald-400 border-l-2 border-emerald-500'
          : 'text-gray-400 hover:bg-gray-850 hover:text-gray-200'}`;

      btn.innerHTML = `💬 ${session.title}`;
      btn.onclick = () => switchSession(session.id, session.title);

      container.appendChild(btn);
    });
  }

  // ================= NEW SESSION =================
  async function createNewSession() {
    const { data, error } = await client
      .from('chat_sessions')
      .insert([{
        title: `Chat ${new Date().toLocaleTimeString()}`
      }])
      .select()
      .single();

    if (error) return alert("Failed to create session");

    activeSessionId = data.id;
    await loadSessions();
    await switchSession(data.id, data.title);
  }

  // ================= SWITCH SESSION (FIXED QUERY) =================
  async function switchSession(id, title) {
    activeSessionId = id;

    document.getElementById('currentChatTitle').innerText =
      `ACTIVE CORE // ${title.toUpperCase()}`;

    await loadSessions();

    const { data, error } = await client
      .from('chat_messages')
      .select('*')
      .eq('session_id', id)   // ✅ FIXED
      .order('created_at', { ascending: true });

    const stream = document.getElementById('chatStream');
    stream.innerHTML = '';

    if (!data || data.length === 0) {
      stream.innerHTML =
        `<div class="text-center py-20 text-gray-600 text-sm font-mono">
          [ No conversation found ]
        </div>`;
      return;
    }

    data.forEach(m => appendMessageUI(m.role, m.content));
  }

  // ================= UI MESSAGE =================
  function appendMessageUI(role, content) {
    const stream = document.getElementById('chatStream');

    const div = document.createElement('div');
    div.className = `max-w-3xl mx-auto p-4 rounded-xl ${
      role === 'user'
        ? 'bg-gray-900/40'
        : 'bg-emerald-950/10 border border-emerald-900/20'
    }`;

    div.innerHTML = `
      <div class="text-xs font-mono mb-1 text-gray-400">
        ${role === 'user' ? 'YOU' : 'REUBEN AI'}
      </div>
      <div class="text-sm text-gray-200 whitespace-pre-wrap">${content}</div>
    `;

    stream.appendChild(div);
    stream.scrollTop = stream.scrollHeight;
  }

  // ================= SEND MESSAGE =================
  async function handleQuery(e) {
    e.preventDefault();

    const input = document.getElementById('userInput');
    const message = input.value.trim();

    if (!message) return;

    input.value = '';

    if (!activeSessionId) {
      await createNewSession();
    }

    // save user
    await client.from('chat_messages').insert([{
      session_id: activeSessionId,
      role: 'user',
      content: message
    }]);

    appendMessageUI('user', message);

    try {
      const res = await fetch(EDGE_FUNCTION_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message })
      });

      const data = await res.json();
      const reply = data.reply || "No response";

      await client.from('chat_messages').insert([{
        session_id: activeSessionId,
        role: 'assistant',
        content: reply
      }]);

      appendMessageUI('assistant', reply);

    } catch (err) {
      appendMessageUI('assistant', "System error: AI offline");
    }
  }
</script>

</body>
</html>
