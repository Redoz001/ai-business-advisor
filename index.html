<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reuben AI // Full Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col font-sans">
    
    <header class="p-4 border-b border-gray-800 bg-gray-900 flex justify-between items-center">
        <h1 class="text-emerald-400 font-bold tracking-tighter">REUBEN AI // V1</h1>
        <button onclick="ReubenApp.newChat()" class="text-xs text-gray-500 hover:text-white">Reset Session</button>
    </header>

    <div id="chat-stream" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

    <div class="p-4 border-t border-gray-800 bg-gray-900">
        <input id="msg-input" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 outline-none focus:border-emerald-500" placeholder="Ask Reuben anything...">
    </div>

    <script>
        const ReubenApp = {
            sb: supabase.createClient("https://whvzdutfyydshamwfhvu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodnpkdXRmeXlkc2hhbXdmaHZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NjQ5MDAsImV4cCI6MjA5NDE0MDkwMH0.KEVgU3l-d9glmFf0n4oO3nOnLnvbxTu98gdwh3hyWmo"),
            sessionId: crypto.randomUUID(),

            async init() {
                this.loadMessages();
                this.listenForUpdates();
                document.getElementById('msg-input').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this.sendMessage();
                });
            },

            async loadMessages() {
                const { data } = await this.sb.from('messages').select('*').order('created_at', { ascending: true });
                if (data) data.forEach(msg => this.render(msg));
            },

            async sendMessage() {
                const input = document.getElementById('msg-input');
                const content = input.value.trim();
                if (!content) return;
                input.value = '';

                // 1. Send User Message
                await this.sb.from('messages').insert({ session_id: this.sessionId, content, is_user: true });

                // 2. Simulate AI Response (Integrate your API here)
                setTimeout(async () => {
                    const aiResponse = "I am Reuben AI. I have received your message: " + content;
                    await this.sb.from('messages').insert({ session_id: this.sessionId, content: aiResponse, is_user: false });
                }, 1000);
            },

            render(msg) {
                const stream = document.getElementById('chat-stream');
                const div = document.createElement('div');
                div.className = `p-4 rounded-xl max-w-lg ${msg.is_user ? 'bg-emerald-600 ml-auto' : 'bg-gray-800 mr-auto'}`;
                div.textContent = msg.content;
                stream.appendChild(div);
                stream.scrollTop = stream.scrollHeight;
            },

            listenForUpdates() {
                this.sb.channel('messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    this.render(payload.new);
                }).subscribe();
            },

            newChat() {
                this.sessionId = crypto.randomUUID();
                document.getElementById('chat-stream').innerHTML = '';
            }
        };

        ReubenApp.init();
    </script>
</body>
</html>
