<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reuben AI // Central Command</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Ensure inputs are always clickable */
    input { pointer-events: auto; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <div id="authOverlay" class="fixed inset-0 bg-gray-950 z-[100] flex items-center justify-center p-4">
    <div class="max-w-sm w-full bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl">
      <h2 class="text-2xl font-bold mb-6 text-emerald-400">REUBEN AI // LOGIN</h2>
      <input type="email" id="email" placeholder="Email" class="w-full bg-gray-800 p-3 rounded mb-4 border border-gray-700 outline-none focus:border-emerald-500 text-white">
      <input type="password" id="password" placeholder="Password" class="w-full bg-gray-800 p-3 rounded mb-6 border border-gray-700 outline-none focus:border-emerald-500 text-white">
      <button onclick="handleLogin()" class="w-full bg-emerald-600 py-3 rounded font-bold hover:bg-emerald-500 transition">Access System</button>
    </div>
  </div>

  <div id="app" class="hidden flex w-full h-screen">
    <div id="sidebar" class="hidden md:flex w-64 bg-gray-900 border-r border-gray-800 p-6 flex-col justify-between">
      <h1 class="text-xl font-bold text-emerald-400">REUBEN AI</h1>
      <button onclick="handleLogout()" class="text-red-400 hover:text-red-300">Logout</button>
    </div>
    <main class="flex-1 p-8">
      <h1 class="text-2xl text-emerald-400">Core Online</h1>
      <div id="chatWindow" class="mt-6 bg-gray-900 p-4 h-64 border border-gray-800 rounded overflow-y-auto"></div>
      <div class="mt-4 flex gap-2">
        <input id="chatInput" type="text" placeholder="Command..." class="flex-1 bg-gray-800 p-3 rounded border border-gray-700 text-white">
        <button onclick="sendMessage()" class="bg-emerald-600 px-6 py-3 rounded font-bold">Send</button>
      </div>
    </main>
  </div>

  <script>
    const sb = supabase.createClient(
      "https://whvzdutfyydshamwfhvu.supabase.co", 
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodnpkdXRmeXlkc2hhbXdmaHZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NjQ5MDAsImV4cCI6MjA5NDE0MDkwMH0.KEVgU3l-d9glmFf0n4oO3nOnLnvbxTu98gdwh3hyWmo"
    );

    // Stop blinking by checking state once, not on a loop
    function updateUI(session) {
      if (session) {
        document.getElementById('authOverlay').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      } else {
        document.getElementById('authOverlay').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
      }
    }

    // Initialize Auth Listener
    sb.auth.onAuthStateChange((event, session) => {
      updateUI(session);
    });

    // Check session on load
    sb.auth.getSession().then(({ data: { session } }) => {
      updateUI(session);
    });

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) alert("Login Error: " + error.message);
    }

    async function handleLogout() {
      await sb.auth.signOut();
      // Don't reload, the listener will update the UI automatically
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const msg = input.value;
      if (!msg) return;
      
      const { data, error } = await sb.functions.invoke('reuben-ai', { body: { message: msg } });
      if (!error) {
        document.getElementById('chatWindow').innerHTML += `<p class="text-white">Reuben: ${data.reply}</p>`;
      }
      input.value = '';
    }
  </script>
</body>
</html>
