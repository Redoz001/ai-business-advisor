<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reuben AI // System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <div id="authOverlay" class="fixed inset-0 bg-gray-950 z-[100] flex items-center justify-center p-4">
    <div class="max-w-sm w-full bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl">
      <h2 class="text-2xl font-bold mb-6 text-emerald-400">REUBEN AI // LOGIN</h2>
      <input type="email" id="email" placeholder="Email" class="w-full bg-gray-800 p-3 rounded mb-4 border border-gray-700">
      <input type="password" id="password" placeholder="Password" class="w-full bg-gray-800 p-3 rounded mb-6 border border-gray-700">
      <button onclick="handleLogin()" class="w-full bg-emerald-600 py-3 rounded font-bold hover:bg-emerald-500">Access System</button>
    </div>
  </div>

  <div id="app" class="hidden flex w-full h-screen">
    <aside id="sidebar" class="hidden md:flex flex-col w-64 bg-gray-900 border-r border-gray-800 p-4">
      <h1 class="text-xl font-bold text-emerald-400 mb-8">REUBEN AI</h1>
      <button onclick="clearChat()" class="p-2 bg-gray-800 rounded w-full text-left">+ New Chat</button>
      <button onclick="handleLogout()" class="mt-auto text-red-400 text-sm">Logout</button>
    </aside>

    <main class="flex-1 flex flex-col h-full">
      <header class="p-4 border-b border-gray-800 flex items-center">
        <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="md:hidden mr-4 text-xl">☰</button>
        <h2 class="font-bold">Chat</h2>
      </header>

      <div id="chatWindow" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

      <div class="p-4 border-t border-gray-800">
        <div class="max-w-3xl mx-auto flex gap-2">
          <input id="chatInput" type="text" class="flex-1 bg-gray-900 p-3 rounded border border-gray-700 outline-none" placeholder="Message...">
          <button onclick="sendMessage()" class="bg-emerald-600 px-6 py-3 rounded font-bold">Send</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const sb = supabase.createClient("https://whvzdutfyydshamwfhvu.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodnpkdXRmeXlkc2hhbXdmaHZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NjQ5MDAsImV4cCI6MjA5NDE0MDkwMH0.KEVgU3l-d9glmFf0n4oO3nOnLnvbxTu98gdwh3hyWmo");

    // AUTH LISTENER
    sb.auth.onAuthStateChange((event, session) => {
      document.getElementById('authOverlay').classList.toggle('hidden', !!session);
      document.getElementById('app').classList.toggle('hidden', !session);
      if (session) loadMessages();
    });

    async function loadMessages() {
      const { data, error } = await sb.from('messages').select('*').order('created_at', { ascending: true });
      if (error) return console.error("Load error:", error);
      
      const win = document.getElementById('chatWindow');
      win.innerHTML = '';
      data.forEach(m => {
        win.innerHTML += `<div class="p-3 rounded-lg ${m.is_user ? 'bg-gray-800 ml-auto' : 'bg-emerald-900/20'} w-fit max-w-[80%]">${m.content}</div>`;
      });
      win.scrollTop = win.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const msg = input.value;
      if (!msg) return;
      input.value = '';

      const { data: { user } } = await sb.auth.getUser();
      
      // 1. Save User Message
      await sb.from('messages').insert({ content: msg, is_user: true, user_id: user.id });
      loadMessages();

      // 2. Call AI
      try {
        const { data, error } = await sb.functions.invoke('reuben-ai', { body: { message: msg } });
        if (error) throw error;
        
        // 3. Save AI Reply
        await sb.from('messages').insert({ content: data.reply, is_user: false, user_id: user.id });
        loadMessages();
      } catch (err) {
        document.getElementById('chatWindow').innerHTML += `<div class="p-3 bg-red-900/20 text-red-400">Error: Could not contact AI. Check Edge Function logs.</div>`;
        console.error(err);
      }
    }

    async function handleLogin() {
      const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('email').value, password: document.getElementById('password').value });
      if (error) alert(error.message);
    }
    
    async function handleLogout() { await sb.auth.signOut(); window.location.reload(); }
  </script>
</body>
</html>
