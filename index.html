<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reuben AI // Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col font-sans">
    
    <header class="p-4 border-b border-gray-800 bg-gray-900">
        <h1 class="text-emerald-400 font-bold">REUBEN AI</h1>
    </header>

    <div id="chat-stream" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

    <div class="p-4 border-t border-gray-800 bg-gray-900">
        <div class="max-w-3xl mx-auto">
            <input id="msg-input" 
                   class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 outline-none focus:border-emerald-500 transition-all" 
                   placeholder="Type a message...">
        </div>
    </div>

    <script>
        // Configuration
        const SUPABASE_URL = "https://whvzdutfyydshamwfhvu.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodnpkdXRmeXlkc2hhbXdmaHZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NjQ5MDAsImV4cCI6MjA5NDE0MDkwMH0.KEVgU3l-d9glmFf0n4oO3nOnLnvbxTu98gdwh3hyWmo";

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const sessionId = crypto.randomUUID();

        // Load Initial Data
        async function init() {
            const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
            if (data) data.forEach(msg => renderMessage(msg));
        }

        // Render Helper
        function renderMessage(msg) {
            const stream = document.getElementById('chat-stream');
            const div = document.createElement('div');
            div.className = 'p-3 bg-emerald-600 rounded-lg max-w-xs ml-auto text-white';
            div.textContent = msg.content;
            stream.appendChild(div);
            stream.scrollTop = stream.scrollHeight;
        }

        // Send Logic
        document.getElementById('msg-input').addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const text = e.target.value.trim();
                if (!text) return;
                e.target.value = '';

                // Database insert (No ID included)
                const { error } = await sb.from('messages').insert({
                    session_id: sessionId,
                    content: text,
                    is_user: true
                });

                if (error) console.error("Database Error:", error);
            }
        });

        // Real-time listener
        sb.channel('messages').on('postgres_changes', { 
            event: 'INSERT', schema: 'public', table: 'messages' 
        }, payload => {
            renderMessage(payload.new);
        }).subscribe();

        init();
    </script>
</body>
</html>
