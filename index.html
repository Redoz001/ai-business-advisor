<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reuben AI // Central Command</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <div id="authOverlay" class="fixed inset-0 bg-gray-950 z-50 flex items-center justify-center p-4">
    <div class="max-w-sm w-full bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl">
      <h2 class="text-2xl font-bold mb-6 text-emerald-400">REUBEN AI // LOGIN</h2>
      <input type="email" id="email" placeholder="Email" class="w-full bg-gray-800 p-3 rounded mb-4 border border-gray-700 outline-none focus:border-emerald-500">
      <input type="password" id="password" placeholder="Password" class="w-full bg-gray-800 p-3 rounded mb-6 border border-gray-700 outline-none focus:border-emerald-500">
      <button onclick="handleLogin()" class="w-full bg-emerald-600 py-3 rounded font-bold hover:bg-emerald-500 transition">Access System</button>
    </div>
  </div>

  <div id="app" class="hidden p-8 max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-emerald-400">System Access Granted</h1>
    <p class="mt-2 text-gray-400">Reuben AI Core Online.</p>
    
    <div id="chatWindow" class="mt-6 bg-gray-900 p-4 h-64 overflow-y-auto border border-gray-800 rounded">
      <p class="text-gray-500">Awaiting input command...</p>
    </div>

    <div class="mt-4 flex gap-2">
      <input id="chatInput" type="text" placeholder="Enter command..." class="flex-1 bg-gray-800 p-3 rounded text-white border border-gray-700 outline-none focus:border-emerald-500">
      <button onclick="sendMessage()" class="bg-emerald-600 px-6 py-3 rounded font-bold hover:bg-emerald-500 transition">Send</button>
    </div>
    
    <button onclick="handleLogout()" class="mt-6 text-red-400 hover:text-red-300">Logout</button>
  </div>

  <script>
    // 1. Initialize
    const sb = supabase.createClient(
      "https://whvzdutfyydshamwfhvu.supabase.co", 
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodnpkdXRmeXlkc2hhbXdmaHZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NjQ5MDAsImV4cCI6MjA5NDE0MDkwMH0.KEVgU3l-d9glmFf0n4oO3nOnLnvbxTu98gdwh3hyWmo"
    );

    // 2. UI Helpers
    function showApp() {
      document.getElementById('authOverlay').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }

    function showLogin() {
      document.getElementById('authOverlay').classList.remove('hidden');
      document.getElementById('app').classList.add('hidden');
    }

    // 3. Auth Management
    sb.auth.onAuthStateChange((event, session) => {
      session ? showApp() : showLogin();
    });

    sb.auth.getSession().then(({ data: { session } }) => {
      session ? showApp() : showLogin();
    });

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) alert("Login Error: " + error.message);
    }

    async function handleLogout() {
      await sb.auth.signOut();
      window.location.reload();
    }

    // 4. Chat Functionality
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const chatWindow = document.getElementById('chatWindow');
      const message = input.value;
      if (!message) return;

      chatWindow.innerHTML += `<p class="mt-2 text-emerald-300">User: ${message}</p>`;
      input.value = '';

      // REPLACE 'reuben-ai-chat' with your actual Edge Function name
      const { data, error } = await sb.functions.invoke('reuben-ai-chat', {
        body: { message: message },
      });

      if (error) {
        chatWindow.innerHTML += `<p class="mt-2 text-red-500">Error: ${error.message}</p>`;
      } else {
        chatWindow.innerHTML += `<p class="mt-2 text-white">Reuben: ${data.reply}</p>`;
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }
  </script>
</body>
</html>
